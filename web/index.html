<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Shivay Tech — Next Gen IT Solutions.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#020408">
  <title>Shivay Tech — Next Gen IT Solutions</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #020408; margin: 0; }
    #loading {
      position: fixed; inset: 0; background: #020408;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.6s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .logo-box {
      width: 72px; height: 72px; border-radius: 16px;
      background: linear-gradient(135deg, #00D4FF, #7C3AED);
      display: flex; align-items: center; justify-content: center;
      font-family: monospace; font-size: 26px; font-weight: 900; color: white;
      animation: pulse 1.5s ease-in-out infinite; margin-bottom: 24px;
    }
    .brand { font-family: monospace; font-size: 20px; font-weight: 900; letter-spacing: 6px; color: #00D4FF; margin-bottom: 6px; }
    .tagline { font-family: monospace; font-size: 10px; letter-spacing: 4px; color: #4A6080; margin-bottom: 40px; }
    .loader-bar { width: 200px; height: 2px; background: rgba(0,212,255,0.1); position: relative; overflow: hidden; }
    .loader-bar::after {
      content: ''; position: absolute; top: 0; left: -60%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, #00D4FF, transparent);
      animation: slide 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 40px rgba(0,212,255,0.4); transform: scale(1); }
      50% { box-shadow: 0 0 60px rgba(0,212,255,0.7); transform: scale(1.05); }
    }
    @keyframes slide { 0% { left: -60%; } 100% { left: 110%; } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo-box">ST</div>
    <div class="brand">SHIVAY TECH</div>
    <div class="tagline">NEXT GEN IT SOLUTIONS</div>
    <div class="loader-bar"></div>
  </div>

  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function () {
      _flutter.loader.loadEntrypoint({
        serviceWorker: { serviceWorkerVersion: null },
        onEntrypointLoaded: function (engineInitializer) {
          engineInitializer.initializeEngine().then(function (appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) { el.classList.add('hidden'); setTimeout(function(){ el.style.display='none'; }, 600); }
    });
  </script>
</body>
</html>
